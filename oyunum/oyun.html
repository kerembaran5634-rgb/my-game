<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unutulmuş Kule</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: #080810;
  color: #d4c9a8;
  font-family: 'Crimson Text', Georgia, serif;
  font-size: 18px;
  line-height: 1.8;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 20px;
  background-image:
    radial-gradient(ellipse at 50% 0%, rgba(100,60,20,0.15) 0%, transparent 60%),
    linear-gradient(rgba(180,150,80,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(180,150,80,0.025) 1px, transparent 1px);
  background-size: 100% 100%, 40px 40px, 40px 40px;
}

#oyun-kutusu { max-width: 760px; width: 100%; padding-top: 20px; }

/* ══════════════════════════════════════
   BAŞLIK
══════════════════════════════════════ */
#baslik {
  text-align: center; margin-bottom: 32px;
  opacity: 0; animation: yuksel 1.4s ease forwards;
}
#baslik h1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(26px, 5vw, 52px);
  color: #c9a84c; letter-spacing: 6px; text-transform: uppercase;
  text-shadow: 0 0 40px rgba(180,130,40,0.4);
}
#baslik .alt-baslik { font-style: italic; color: #5a5040; font-size: 14px; letter-spacing: 3px; margin-top: 4px; }
.ayirici { width: 160px; height: 1px; background: linear-gradient(90deg, transparent, #c9a84c55, #c9a84c, #c9a84c55, transparent); margin: 14px auto; }

/* ══════════════════════════════════════
   HARITA / ODA SİSTEMİ
   Her oda küçük bir kutu, aktif olan vurgulu
══════════════════════════════════════ */
#harita-wrap {
  margin-bottom: 20px;
  background: rgba(10,8,5,0.9);
  border: 1px solid rgba(180,150,60,0.15);
  border-radius: 4px;
  padding: 14px 18px;
  opacity: 0; animation: goster 1s 0.5s ease forwards;
}
#harita-baslik {
  font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 2px;
  color: #5a5040; text-transform: uppercase; margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
#harita-baslik::after { content:''; flex:1; height:1px; background:rgba(180,150,60,0.1); }
#harita-odalar {
  display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
}
.harita-oda {
  font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 1px;
  padding: 5px 10px; border-radius: 2px;
  border: 1px solid rgba(180,150,60,0.15);
  color: #5a5040; background: transparent;
  transition: all 0.3s ease; white-space: nowrap;
  position: relative;
}
.harita-oda.kesfedildi { color: #7a6e5a; border-color: rgba(180,150,60,0.25); }
.harita-oda.aktif {
  color: #c9a84c; border-color: rgba(180,150,60,0.7);
  background: rgba(180,150,60,0.08);
  box-shadow: 0 0 12px rgba(180,150,60,0.15);
}
.harita-ok { color: #3a3028; font-size: 12px; }

/* Bolum rozeti */
.bolum-rozet {
  font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 1px;
  padding: 3px 8px; border-radius: 2px; margin-right: 4px;
  color: #c9a84c; border: 1px solid rgba(180,150,60,0.3);
  background: rgba(180,150,60,0.05);
}

/* ══════════════════════════════════════
   DURUM ÇUBUĞU
══════════════════════════════════════ */
#durum-cubugu {
  display: flex; gap: 0; flex-wrap: wrap;
  margin-bottom: 20px;
  font-size: 12px; color: #5a5040;
  letter-spacing: 1px; font-family: 'Cinzel', serif;
  background: rgba(10,8,5,0.9);
  border: 1px solid rgba(180,150,60,0.12);
  border-radius: 4px; overflow: hidden;
}
.durum-item {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px;
  border-right: 1px solid rgba(180,150,60,0.08);
  flex-shrink: 0;
}
.durum-item:last-child { border-right: none; flex: 1; }
.durum-label { color: #3a3028; font-size: 10px; }
.durum-deger { color: #c9a84c; }
#can-bar-bg { width: 70px; height: 5px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
#can-bar { height: 100%; border-radius: 3px; transition: width 0.5s ease, background 0.5s ease; }

/* ══════════════════════════════════════
   SAHNE GÖRSELİ (ASCII ART ALANI)
══════════════════════════════════════ */
#sahne-gorseli {
  width: 100%; margin-bottom: 0;
  background: rgba(8,6,3,0.95);
  border: 1px solid rgba(180,150,60,0.15);
  border-bottom: none;
  border-radius: 4px 4px 0 0;
  padding: 28px 20px 20px;
  text-align: center;
  min-height: 140px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
/* Sahne görseli arka plan parıltısı */
#sahne-gorseli::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 100%, rgba(180,130,40,0.06) 0%, transparent 70%);
  pointer-events: none;
}
#sahne-ascii {
  font-size: clamp(48px, 8vw, 72px);
  line-height: 1; margin-bottom: 8px;
  filter: drop-shadow(0 0 20px rgba(180,130,40,0.5));
  transition: all 0.5s ease;
}
#sahne-lokasyon {
  font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 3px;
  color: #5a5040; text-transform: uppercase;
}
/* Atmosfer rengi (sahneye göre değişir) */
#sahne-gorseli.atmosfer-karanlık { background: rgba(5,3,3,0.98); }
#sahne-gorseli.atmosfer-savas { background: rgba(15,5,5,0.98); }
#sahne-gorseli.atmosfer-umut { background: rgba(5,8,5,0.98); }
#sahne-gorseli.atmosfer-gizemli { background: rgba(5,5,12,0.98); }

/* ══════════════════════════════════════
   METİN KUTUSU
══════════════════════════════════════ */
#metin-kutusu {
  background: rgba(12,10,6,0.95);
  border: 1px solid rgba(180,150,60,0.2);
  border-top: none;
  border-radius: 0 0 4px 4px;
  padding: 28px 36px;
  margin-bottom: 20px; min-height: 120px; position: relative;
}
#metin-kutusu::after {
  content: ''; position: absolute; bottom: 8px; right: 8px;
  width: 16px; height: 16px;
  border-right: 1px solid rgba(180,150,60,0.3);
  border-bottom: 1px solid rgba(180,150,60,0.3);
}
/* typewriter efekti için — her p görünür ama yazı teker teker çıkar */
#metin-kutusu p { margin-bottom: 12px; min-height: 1.8em; }
.vurgu  { color: #c9a84c; font-style: italic; }
.cesur  { color: #e8d9b0; font-weight: 600; }
.kirmizi{ color: #e05555; font-weight: 600; }
.yesil  { color: #6abf69; font-weight: 600; }
.mavi   { color: #5096dc; font-weight: 600; }

/* Typewriter imleci */
.kursor::after {
  content: '▋'; color: #c9a84c; animation: kirp 0.8s step-end infinite;
}
@keyframes kirp { 0%,100%{opacity:1} 50%{opacity:0} }

/* ══════════════════════════════════════
   SEÇENEKLER
══════════════════════════════════════ */
#secenekler { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
.secenek-btn {
  background: rgba(10,8,5,0.8);
  border: 1px solid rgba(180,150,60,0.2);
  color: #a09070; font-family: 'Crimson Text', serif; font-size: 16px;
  padding: 13px 22px; text-align: left; cursor: pointer;
  border-radius: 2px; transition: all 0.2s ease;
  position: relative; opacity: 0; animation: goster 0.4s ease forwards;
  letter-spacing: 0.3px;
}
.secenek-btn span.ok { color: #5a5040; margin-right: 12px; transition: all 0.2s; display: inline-block; }
.secenek-btn:hover { background: rgba(180,150,60,0.07); border-color: rgba(180,150,60,0.5); color: #d4c9a8; }
.secenek-btn:hover span.ok { color: #c9a84c; transform: translateX(4px); }
.secenek-btn:active { transform: scale(0.995); }
.secenek-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.secenek-btn.saldir   { border-color: rgba(220,80,80,0.25); }
.secenek-btn.saldir:hover { background: rgba(220,80,80,0.08); border-color: rgba(220,80,80,0.6); }
.secenek-btn.savun    { border-color: rgba(80,150,220,0.25); }
.secenek-btn.savun:hover { background: rgba(80,150,220,0.08); border-color: rgba(80,150,220,0.6); }
.secenek-btn.strateji { border-color: rgba(180,150,60,0.35); }
.secenek-btn.strateji:hover { background: rgba(180,150,60,0.1); }

/* Büyü butonları */
.secenek-btn.buyu { border-color: rgba(150,80,220,0.3); }
.secenek-btn.buyu:hover { background: rgba(150,80,220,0.08); border-color: rgba(150,80,220,0.6); color: #c9a8e8; }

/* ══════════════════════════════════════
   SAVAŞ ALANI
══════════════════════════════════════ */
#savas-alani {
  display: none;
  margin-bottom: 20px;
  border: 1px solid rgba(220,80,80,0.2);
  border-radius: 4px; overflow: hidden;
  background: rgba(15,5,5,0.95);
}
#savas-baslik {
  background: rgba(220,80,80,0.1);
  padding: 8px 20px; font-family:'Cinzel',serif;
  font-size: 11px; letter-spacing: 3px; color: #c04040;
  text-align: center; text-transform: uppercase;
  border-bottom: 1px solid rgba(220,80,80,0.15);
}
#savas-icerik { display: flex; }

/* Düşman kartı */
#dusman-kart {
  width: 220px; flex-shrink: 0;
  padding: 18px; border-right: 1px solid rgba(220,80,80,0.15);
}
#dusman-ascii-savas {
  font-size: 44px; text-align: center; margin-bottom: 10px;
  filter: drop-shadow(0 0 12px rgba(220,80,80,0.4));
}
/* Düşman sağlık animasyonu (vurulunca) */
@keyframes vurul { 0%,100%{filter:drop-shadow(0 0 12px rgba(220,80,80,0.4))} 50%{filter:drop-shadow(0 0 24px rgba(255,50,50,0.9)) brightness(1.5)} }
.dusman-vurulan { animation: vurul 0.3s ease; }

#dusman-isim { font-family:'Cinzel',serif; font-size:13px; color:#e05555; margin-bottom:6px; letter-spacing:1px; }
.dusman-can-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
#dusman-can-bg { flex:1; height:6px; background:rgba(255,255,255,0.06); border-radius:3px; overflow:hidden; }
#dusman-can-bar { height:100%; background:linear-gradient(90deg, #6b0000, #e05555); border-radius:3px; transition:width 0.5s ease; }
#dusman-can-sayi-wrap { font-family:'Cinzel',serif; font-size:11px; color:#7a4040; white-space:nowrap; }
#dusman-zayiflik { font-size:12px; color:#5a4040; font-style:italic; line-height:1.5; margin-top:4px; }

/* Büyü gücü göstergesi */
#buyu-guc-wrap { margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(180,150,60,0.1); }
#buyu-guc-baslik { font-family:'Cinzel',serif; font-size:10px; letter-spacing:1px; color:#5a4070; margin-bottom:4px; }
#buyu-guc-bar-bg { height:5px; background:rgba(255,255,255,0.05); border-radius:3px; overflow:hidden; }
#buyu-guc-bar { height:100%; background:linear-gradient(90deg, #3a1060, #9050d0); border-radius:3px; transition:width 0.4s ease; width:0%; }

/* Savaş log */
#oyuncu-savas { flex:1; padding:18px; display:flex; flex-direction:column; }
#oyuncu-savas-baslik { font-family:'Cinzel',serif; font-size:10px; color:#5a5040; margin-bottom:8px; letter-spacing:2px; text-transform:uppercase; }
#savas-log { flex:1; font-size:14px; line-height:1.7; color:#6a6050; max-height:160px; overflow-y:auto; padding-right:4px; }
#savas-log p { margin-bottom:2px; opacity:0; animation:goster 0.3s ease forwards; }
.log-hasar   { color:#c05050; }
.log-savun   { color:#4080b0; }
.log-strateji{ color:#b09040; }
.log-buyu    { color:#9050c0; }
.log-sistem  { color:#5a5040; font-style:italic; }
.log-zafer   { color:#70a060; font-weight:600; }
.log-hasar-al{ color:#e06060; }

/* Tur sayacı */
#tur-sayac { font-family:'Cinzel',serif; font-size:10px; color:#3a3028; margin-top:8px; letter-spacing:1px; text-align:right; }

/* ══════════════════════════════════════
   NPC KONUŞMA KUTUSU
══════════════════════════════════════ */
#npc-kutu {
  display: none;
  margin-bottom: 16px;
  border: 1px solid rgba(100,180,100,0.2);
  border-radius: 4px; overflow: hidden;
  background: rgba(5,12,5,0.95);
}
#npc-baslik {
  padding: 8px 16px;
  background: rgba(100,180,100,0.08);
  border-bottom: 1px solid rgba(100,180,100,0.1);
  font-family: 'Cinzel',serif; font-size:11px; letter-spacing:2px;
  color: #507050; display: flex; align-items: center; gap: 10px;
}
#npc-avatar { font-size:20px; }
#npc-isim-yazi { color: #70a070; }
#npc-metin { padding: 14px 18px; font-size:16px; color:#90b090; font-style:italic; line-height:1.7; }

/* ══════════════════════════════════════
   YAN GÖREV PANELI
══════════════════════════════════════ */
#gorev-panel {
  margin-bottom: 20px;
  background: rgba(8,6,3,0.9);
  border: 1px solid rgba(180,150,60,0.1);
  border-radius: 4px; overflow: hidden;
}
#gorev-baslik {
  padding: 8px 16px;
  border-bottom: 1px solid rgba(180,150,60,0.08);
  font-family:'Cinzel',serif; font-size:10px; letter-spacing:2px;
  color:#5a5040; text-transform:uppercase;
  display:flex; align-items:center; justify-content:space-between;
  cursor:pointer; user-select:none;
}
#gorev-baslik:hover { color:#8a8060; }
#gorev-icerik { padding: 10px 16px; }
.gorev-satir {
  display:flex; align-items:flex-start; gap:10px;
  padding: 6px 0; border-bottom: 1px solid rgba(180,150,60,0.06);
  font-size:14px;
}
.gorev-satir:last-child { border-bottom:none; }
.gorev-durum { font-size:12px; flex-shrink:0; margin-top:2px; }
.gorev-metin { color:#7a7060; line-height:1.5; }
.gorev-metin.tamamlandi { color:#507050; text-decoration:line-through; opacity:0.6; }
.gorev-puan { font-family:'Cinzel',serif; font-size:10px; color:#5a5040; flex-shrink:0; margin-left:auto; }

/* ══════════════════════════════════════
   GEÇİŞ PERDESİ
══════════════════════════════════════ */
#gecis-perdesi {
  position:fixed; inset:0; background:#080810;
  pointer-events:none; opacity:0;
  transition:opacity 0.5s ease; z-index:100;
}

/* Bildirim (ekranın üstünde çıkan küçük mesaj) */
#bildirim {
  position:fixed; top:20px; left:50%; transform:translateX(-50%);
  background:rgba(20,15,8,0.95); border:1px solid rgba(180,150,60,0.4);
  border-radius:3px; padding:10px 20px;
  font-family:'Cinzel',serif; font-size:12px; letter-spacing:1px; color:#c9a84c;
  opacity:0; transition:opacity 0.3s ease; z-index:200;
  pointer-events:none; white-space:nowrap;
}

/* ══════════════════════════════════════
   ANİMASYONLAR
══════════════════════════════════════ */
@keyframes yuksel  { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
@keyframes goster  { from{opacity:0;transform:translateY(6px)}  to{opacity:1;transform:translateY(0)} }
@keyframes sarsil  { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 60%{transform:translateX(6px)} }
@keyframes parlat  { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 30px rgba(180,130,40,0.3)} }
@keyframes buyuEfekt {
  0%   { text-shadow: 0 0 0px rgba(150,80,220,0); }
  50%  { text-shadow: 0 0 30px rgba(150,80,220,0.8), 0 0 60px rgba(100,50,180,0.4); }
  100% { text-shadow: 0 0 0px rgba(150,80,220,0); }
}
.sarsil { animation: sarsil 0.35s ease; }
.parlat { animation: parlat 0.6s ease; }

/* ══════════════════════════════════════
   MOBİL
══════════════════════════════════════ */
@media (max-width:600px) {
  #metin-kutusu { padding:20px 18px; }
  #savas-icerik { flex-direction:column; }
  #dusman-kart { width:100%; border-right:none; border-bottom:1px solid rgba(220,80,80,0.15); }
  .durum-item { padding:8px 12px; }
}
</style>
</head>
<body>
<div id="gecis-perdesi"></div>
<div id="bildirim"></div>

<div id="oyun-kutusu">

  <!-- BAŞLIK -->
  <div id="baslik">
    <div class="alt-baslik">Bir Metin Macerası</div>
    <div class="ayirici"></div>
    <h1>Unutulmuş Kule</h1>
    <div class="ayirici"></div>
  </div>

  <!-- HARITA -->
  <div id="harita-wrap">
    <div id="harita-baslik">🗺 Konum</div>
    <div id="harita-odalar"></div>
  </div>

  <!-- YAN GÖREVLER -->
  <div id="gorev-panel">
    <div id="gorev-baslik" onclick="gorevToggle()">
      📜 GÖREVLER <span id="gorev-ok">▾</span>
    </div>
    <div id="gorev-icerik"></div>
  </div>

  <!-- DURUM ÇUBUĞU -->
  <div id="durum-cubugu">
    <div class="durum-item">
      <span class="durum-label">KAHRAMAN</span>
      <span class="durum-deger" id="d-isim">Kael</span>
    </div>
    <div class="durum-item">
      <span class="durum-label">CAN</span>
      <span class="durum-deger" id="d-can-yazi">100</span>
      <span id="can-bar-bg"><span id="can-bar" style="width:100%;background:#6abf69"></span></span>
    </div>
    <div class="durum-item">
      <span class="durum-label">CESARET</span>
      <span class="durum-deger" id="d-cesaret">★★★☆☆</span>
    </div>
    <div class="durum-item">
      <span class="durum-label">BÜYÜ</span>
      <span class="durum-deger" id="d-buyu">✦✦✦✦✦</span>
    </div>
    <div class="durum-item">
      <span class="durum-label">ENVANTER</span>
      <span class="durum-deger" id="d-envanter">Fener, Hançer</span>
    </div>
  </div>

  <!-- SAHNE GÖRSELİ -->
  <div id="sahne-gorseli">
    <div id="sahne-ascii">🏰</div>
    <div id="sahne-lokasyon">Bilinmeyen Konum</div>
  </div>

  <!-- NPC KONUŞMA -->
  <div id="npc-kutu">
    <div id="npc-baslik">
      <span id="npc-avatar">👤</span>
      <span id="npc-isim-yazi">???</span>
    </div>
    <div id="npc-metin"></div>
  </div>

  <!-- HİKAYE METNİ -->
  <div id="metin-kutusu"></div>

  <!-- SAVAŞ ALANI -->
  <div id="savas-alani">
    <div id="savas-baslik">⚔ SAVAŞ ⚔</div>
    <div id="savas-icerik">
      <div id="dusman-kart">
        <div id="dusman-ascii-savas">👹</div>
        <div id="dusman-isim">Düşman</div>
        <div class="dusman-can-row">
          <div id="dusman-can-bg"><div id="dusman-can-bar" style="width:100%"></div></div>
          <div id="dusman-can-sayi-wrap"><span id="d-can-sayi">0</span>/<span id="d-can-max">0</span></div>
        </div>
        <div id="dusman-zayiflik"></div>
        <div id="buyu-guc-wrap">
          <div id="buyu-guc-baslik">✦ BÜYÜ GÜCÜ</div>
          <div id="buyu-guc-bar-bg"><div id="buyu-guc-bar"></div></div>
        </div>
      </div>
      <div id="oyuncu-savas">
        <div id="oyuncu-savas-baslik">Savaş Kayıtları</div>
        <div id="savas-log"></div>
        <div id="tur-sayac">TUR 1</div>
      </div>
    </div>
  </div>

  <!-- SEÇENEKLER -->
  <div id="secenekler"></div>

</div>

<script>
/*
╔══════════════════════════════════════════════════════════════╗
║  UNUTULMUŞ KULE — GELİŞMİŞ VERSİYON                        ║
║  YENİ ÖZELLİKLER:                                           ║
║  • Harita sistemi (hangi odadasın, neleri keşfettin)        ║
║  • Typewriter efekti (metin teker teker çıkıyor)            ║

// ── TYPEWRITER SİSTEMİ ────────────────────────────────────────
/*
  Bu sistem metni harf harf ekrana yazar.
  HTML taglarını (span, b vb.) olduğu gibi bırakır,
  sadece düz metni harf harf çıkarır.

  Nasıl çalışır:
  1. Metni karakterlere böl
  2. Her karakteri belirli aralıkla (ms) ekle
  3. HTML taglarını bir anda ekle (harflerini gösterme)
*/
function typewriterYaz(element, htmlMetin, hiz, callback) {
  element.innerHTML = "";
  let i = 0;
  let metin = htmlMetin;

  function sonrakiKarakter() {
    if (i >= metin.length) {
      if (callback) callback();
      return;
    }

    // HTML tag başlıyor mu? (< karakteri)
    if (metin[i] === '<') {
      // Tag'ın sonunu bul (>)
      const tagSonu = metin.indexOf('>', i);
      if (tagSonu !== -1) {
        // Tüm tag'ı bir anda ekle
        element.innerHTML = metin.substring(0, tagSonu + 1);
        i = tagSonu + 1;
      } else {
        element.innerHTML = metin.substring(0, i + 1);
        i++;
      }
    } else {
      // Normal karakter — harf harf
      element.innerHTML = metin.substring(0, i + 1);
      i++;
    }

    setTimeout(sonrakiKarakter, hiz);
  }

  sonrakiKarakter();
}

// Tüm paragrafları sırayla typewriter ile yaz
function paragraflaraYaz(paragraflar, container, hiz, tamamCallback) {
  container.innerHTML = "";
  let pIndex = 0;

  function sonrakiParagraf() {
    if (pIndex >= paragraflar.length) {
      if (tamamCallback) tamamCallback();
      return;
    }
    const p = document.createElement("p");
    if (pIndex === paragraflar.length - 1) p.classList.add("kursor");
    container.appendChild(p);
    typewriterYaz(p, paragraflar[pIndex], hiz, () => {
      p.classList.remove("kursor");
      pIndex++;
      setTimeout(sonrakiParagraf, 200);
    });
  }

  sonrakiParagraf();
}

// ── HARITA GÜNCELLE ────────────────────────────────────────────
function haritaGuncelle(sahneAdi) {
  const konumId = sahneKonum[sahneAdi];
  if (konumId) kesfedilenler.add(konumId);

  const container = document.getElementById("harita-odalar");
  container.innerHTML = "";

  let aktifBolum = null;
  if (konumId) {
    const oda = haritaOdalari.find(o => o.id === konumId);
    if (oda) aktifBolum = oda.bolum;
  }

  // Bölüm rozeti
  if (aktifBolum) {
    const rozet = document.createElement("span");
    rozet.className = "bolum-rozet";
    rozet.textContent = `${aktifBolum}. BÖLÜM`;
    container.appendChild(rozet);
  }

  haritaOdalari.forEach((oda, i) => {
    const aktif = oda.id === konumId;
    const kesfedildi = kesfedilenler.has(oda.id);

    if (!kesfedildi && !aktif) return; // Keşfedilmemişi gösterme

    if (i > 0 && kesfedildi) {
      const ok = document.createElement("span");
      ok.className = "harita-ok";
      ok.textContent = " › ";
      container.appendChild(ok);
    }

    const div = document.createElement("div");
    div.className = "harita-oda" + (kesfedildi ? " kesfedildi" : "") + (aktif ? " aktif" : "");
    div.textContent = oda.isim;
    container.appendChild(div);
  });
}

function savasHamle(hamle, sahneSonrasi, olumSahnesi, secDiv) {
  if (!aktifSavas) return;
  const d = aktifSavas.dusman;
  const rastgele = () => Math.floor(Math.random() * 8) - 3;

  let oyuncuHasar = oyuncu.saldiriGucu + rastgele();
  let dusmanHasar = d.saldiri + rastgele();
  let aciklama = ""; let logSinif = "";

  // Büyü gücü kazanımı: her hamle 1 puan verir
  oyuncu.buyuGucu = Math.min(oyuncu.maxBuyuGucu, oyuncu.buyuGucu + 1);

  if (hamle === "saldir") {
    aciklama = "⚔️ Direkt saldırı!"; logSinif = "log-hasar";
    if (d.zayiflik === "saldir") { oyuncuHasar = Math.floor(oyuncuHasar * 2); aciklama += " <span style='color:#6abf69'>ZAYIF NOKTA! ×2</span>"; }
  } else if (hamle === "savun") {
    aciklama = "🛡️ Savunmaya geçtin."; logSinif = "log-savun";
    oyuncuHasar = Math.floor(oyuncuHasar * 0.6);
    dusmanHasar = Math.max(0, dusmanHasar - oyuncu.savunma - 8);
    if (d.zayiflik === "savun") { oyuncuHasar = Math.floor(oyuncuHasar * 2.5); aciklama += " <span style='color:#6abf69'>ZAYIF NOKTA!</span>"; }
  } else if (hamle === "strateji") {
    aciklama = "🎯 Stratejik hamle!"; logSinif = "log-strateji";
    if (d.zayiflik === "strateji") { oyuncuHasar = Math.floor(oyuncuHasar * 2.2); aciklama += " <span style='color:#6abf69'>ZAYIF NOKTA! ×2.2</span>"; }
    else { dusmanHasar = Math.floor(dusmanHasar * 1.4); aciklama += " <span style='color:#e05555'>Yanlış! Düşman fırsatı kullandı.</span>"; }
  } else if (hamle === "buyu") {
    // BÜYÜ HAMLESİ
    aciklama = "✨ Büyü patlaması!"; logSinif = "log-buyu";
    oyuncuHasar = Math.floor((oyuncu.saldiriGucu * 2.5) + rastgele());
    dusmanHasar = Math.floor(dusmanHasar * 0.3); // Büyü kullanınca düşman şaşırır
    oyuncu.buyuGucu = 0; // Büyü gücü sıfırla
    // Büyü animasyonu
    document.getElementById("sahne-ascii").style.animation = "buyuEfekt 0.8s ease";
    setTimeout(() => { document.getElementById("sahne-ascii").style.animation = ""; }, 800);
    bildirimGoster("✨ Büyü gücü kullanıldı!", 2000);
  }

  oyuncuHasar = Math.max(1, oyuncuHasar);
  dusmanHasar = Math.max(0, dusmanHasar);

  d.can = Math.max(0, d.can - oyuncuHasar);
  oyuncu.can = Math.max(0, oyuncu.can - dusmanHasar);

  savasLogEkle(`Tur ${aktifSavas.tur}: ${aciklama}`, logSinif);
  savasLogEkle(`› Sen <span class='log-zafer'>-${oyuncuHasar}</span> verdin | Aldın: <span class='log-hasar-al'>-${dusmanHasar}</span>`, "");

  // Düşman can bar
  const dYuzde = (d.can / d.maxCan) * 100;
  document.getElementById("dusman-can-bar").style.width = dYuzde + "%";
  document.getElementById("d-can-sayi").textContent = d.can;
  document.getElementById("tur-sayac").textContent = `TUR ${aktifSavas.tur}`;

  // Düşman vurulma animasyonu
  const dAscii = document.getElementById("dusman-ascii-savas");
  dAscii.classList.add("dusman-vurulan");
  setTimeout(() => dAscii.classList.remove("dusman-vurulan"), 300);

  // Oyuncu hasar aldıysa sarsıl
  if (dusmanHasar > 0) {
    document.getElementById("oyun-kutusu").classList.add("sarsil");
    setTimeout(() => document.getElementById("oyun-kutusu").classList.remove("sarsil"), 350);
  }

  buyuBarGuncelle();
  durumGuncelle();
  aktifSavas.tur++;

  // Sonuç kontrolü
  if (d.can <= 0) {
    setTimeout(() => savasKazan(sahneSonrasi), 700);
  } else if (oyuncu.can <= 0) {
    setTimeout(() => savasKaybe(olumSahnesi), 700);
  } else {
    // Savaş devam
    setTimeout(() => {
      secDiv.querySelectorAll("button").forEach(b => b.disabled = false);
    }, 450);
  }
}

function savasKazan(sahneSonrasi) {
  if (!aktifSavas) return;
  savasLogEkle(`✦ ${aktifSavas.dusman.olumMetni}`, "log-zafer");
  // Gece yarısı için özel kayıt
  if (aktifSavas.dusman.isim === "Gece Yarısı") oyuncu.kararlar.push("gece_oldu");
  oyuncu.puan += 100;
  bildirimGoster("⚔️ Zafer! +100 puan", 2500);
  setTimeout(() => {
    document.getElementById("savas-alani").style.display = "none";
    aktifSavas = null;
    sahneGecis(sahneSonrasi);
  }, 1200);
}

function savasKaybe(olumSahnesi) {
  savasLogEkle("💀 Düştün...", "log-hasar");
  oyuncu.can = 100;
  setTimeout(() => {
    document.getElementById("savas-alani").style.display = "none";
    aktifSavas = null;
    sahneGecis(olumSahnesi);
  }, 1200);
}

      "\"Ben gördüm. Aldric formülü onun için buldu. Ama <span class='kirmizi'>kullanmadı.</span>\"",
      "\"<span class='cesur'>Ben kullanacağım. Bir daha kimse kaybetmeyecek.</span>\""
    ],
    secenekler: [
      { metin: "\"Bu hatalı. Savaşacağım.\"", sonraki: "b3_son_savas", etki: (o) => o.kararlar.push("raven_anladi") },
      { metin: "\"Belki haklısın...\"", sonraki: "b3_ihanet" },
    ]
  },
  "b3_ihanet": {
    metin: ["\"Gözlerinde inanç yok. Beni durdurmaya çalışıyorsun.\" — <span class='kirmizi'>\"Pişman olacaksın.\"</span>"],
    secenekler: [{ metin: "Savaş — başka yol yok", sonraki: "b3_son_savas" }]
  },
  "b3_son_savas": {
    tip:"savas", dusman:"birlik_lideri",
    metin: [
      "<span class='cesur'>Raven kristal zırhını çıkarıyor.</span>",
      "\"Sen babanın gururusun. Ama bu seni kurtarmaz.\" <span class='kirmizi'>Son savaş.</span>"
    ],
    sahneSonrasi:"b3_zafer", olumSahnesi:"b3_olum"
  },
  "b3_olum": {
    metin: ["Raven son darbeyi indiriyor. <span class='kirmizi'>Formül onun eline geçiyor.</span>"],
    secenekler: [{ metin: "[ Tekrar Dene ]", sonraki: "b3_giris", etki: (o) => o.can=100 }]
  },
  "b3_zafer": {
    metin: [
      "<span class='yesil'>Raven yere düşüyor.</span> Maske çatlıyor. Altında genç, yorgun bir yüz.",
      "\"Bırak beni... yok edeyim. Bu benim yapabileceğim son iyi şey.\""
    ],
    secenekler: [
      { metin: "Raven'a güven", sonraki: "son_iyi" },
      { metin: "Formülü kendin yok et", sonraki: "son_kendi" },
    ]
  },
  "son_iyi": {
    metin: [
      "Raven kristallere uzanıyor. <span class='cesur'>Işık patlaması. Tüm kristaller kararıyor.</span>",
      "Baban eski öğrencisinin yanına diz çöküyor.",
      "Ve sen orada, her şeyin nasıl hem bittiğini hem başladığını hissediyorsun.",
      "<span class='yesil'>✦ OYUN SONU — Barış ✦</span>"
    ],
    secenekler: [{ metin: "[ Baştan Oyna ]", sonraki: "baslangic", etki: resetOyuncu }]
  },
  "son_kendi": {
    metin: [
      "Kristallere yumruğunu vuruyorsun. <span class='kirmizi'>Acı.</span> Ama devam ediyorsun.",
      "Baban koşuyor. \"Kael!\" Gözlerini açıyorsun. <span class='yesil'>\"Bitti.\"</span>",
      "<span class='yesil'>✦ OYUN SONU — Fedakarlık ✦</span>"
    ],
    secenekler: [{ metin: "[ Baştan Oyna ]", sonraki: "baslangic", etki: resetOyuncu }]
  },
};

// ── RESET ────────────────────────────────────────────────────
function resetOyuncu(o) {
  o.can=100; o.maxCan=100; o.cesaret=3; o.buyuGucu=0;
  o.envanter=["Fener","Hançer"]; o.kararlar=[]; o.puan=0;
  o.saldiriGucu=18; o.savunma=5;
  kesfedilenler.clear();
}

// ── ANA SAHNE YÜKLEYİCİ ──────────────────────────────────────
let typewriterDevam = true; // Typewriter sırasında bekleyelim mi

function sahneYukle(sahneAdi) {
  const sahne = sahneler[sahneAdi];
  if (!sahne) { console.error("Sahne yok:", sahneAdi); return; }

  const metinKutusu = document.getElementById("metin-kutusu");
  const secDiv = document.getElementById("secenekler");
  metinKutusu.innerHTML = "";
  secDiv.innerHTML = "";

  // Harita güncelle
  haritaGuncelle(sahneAdi);

  // Sahne görseli güncelle
  const gorsel = sahneGorselleri[sahneAdi] || { emoji:"🏰", lokasyon:"Kule", atmosfer:"" };
  const sahneEl = document.getElementById("sahne-gorseli");
  sahneEl.className = gorsel.atmosfer || "";
  document.getElementById("sahne-ascii").textContent = gorsel.emoji;
  document.getElementById("sahne-lokasyon").textContent = gorsel.lokasyon;

  // NPC göster / gizle
  npcGoster(gorsel.npc || null);

  // Görevleri güncelle
  gorevGuncelle();
  durumGuncelle();

  // SAVAŞ SAHNESİ mi?
  if (sahne.tip === "savas") {
    sahne.metin.forEach((p, i) => {
      const el = document.createElement("p");
      el.innerHTML = p;
      el.style.opacity = "0";
      el.style.animation = `goster 0.5s ${i*0.2}s ease forwards`;
      metinKutusu.appendChild(el);
    });
    savaSBaslat(sahne);
    const sahneSonrasi = sahne.sahneSonrasi;
    const olumSahnesi = sahne.olumSahnesi;

    [
      { id:"saldir",   metin:"⚔️  Saldır — Direkt hasar ver",          sinif:"saldir"   },
      { id:"savun",    metin:"🛡️  Savun — Hasarı azalt, karşılık ver",  sinif:"savun"    },
      { id:"strateji", metin:"🎯  Strateji — Zayıflığı bul ve vur",     sinif:"strateji" },
      { id:"buyu",     metin:"✨  Büyü Patlaması — 5 güç gerekli",      sinif:"buyu"     },
    ].forEach((h, i) => {
      const btn = document.createElement("button");
      btn.className = "secenek-btn " + h.sinif;
      btn.innerHTML = `<span class="ok">›</span>${h.metin}`;
      btn.style.animationDelay = (sahne.metin.length * 0.2 + i * 0.12 + 0.3) + "s";
      if (h.id === "buyu") {
        btn.title = "5 büyü gücü birik lazım";
      }
      btn.addEventListener("click", () => {
        // Büyü için güç kontrolü
        if (h.id === "buyu" && oyuncu.buyuGucu < oyuncu.maxBuyuGucu) {
          bildirimGoster(`✦ ${oyuncu.buyuGucu}/${oyuncu.maxBuyuGucu} — Yeterli büyü gücü yok!`, 2000);
          return;
        }
        if (!aktifSavas) return;
        secDiv.querySelectorAll("button").forEach(b => b.disabled = true);
        savasHamle(h.id, sahneSonrasi, olumSahnesi, secDiv);
      });
      secDiv.appendChild(btn);
    });
    return;
  }

  // NORMAL SAHNE — typewriter ile metin yaz
  typewriterDevam = false;
  paragraflaraYaz(sahne.metin, metinKutusu, 22, () => {
    typewriterDevam = true;
    // Seçenekler typewriter bittikten sonra çıksın
    sahne.secenekler.forEach((s, i) => {
      if (s.kosul && !s.kosul(oyuncu)) return;
      const btn = document.createElement("button");
      btn.className = "secenek-btn";
      btn.innerHTML = `<span class="ok">›</span>${s.metin}`;
      btn.style.animationDelay = (i * 0.12) + "s";
      btn.style.opacity = "0";
      btn.style.animation = `goster 0.4s ${i*0.12}s ease forwards`;
      btn.addEventListener("click", () => {
        if (s.etki) s.etki(oyuncu);
        sahneGecis(s.sonraki);
      });
      secDiv.appendChild(btn);
    });
    // Son görev kontrolü
    if (sahneAdi === "son_iyi" || sahneAdi === "son_kendi") {
      oyuncu.kararlar.push("oyun_bitti");
      gorevGuncelle();
      bildirimGoster(`🏆 Oyun tamamlandı! Toplam puan: ${oyuncu.puan}`, 4000);
    }
  });
}

// ── SAHNE GEÇİŞİ ────────────────────────────────────────────
function sahneGecis(sahneAdi) {
  const perde = document.getElementById("gecis-perdesi");
  perde.style.opacity = "1"; perde.style.pointerEvents = "all";
  setTimeout(() => {
    sahneYukle(sahneAdi);
    perde.style.opacity = "0"; perde.style.pointerEvents = "none";
    window.scrollTo({ top: 0, behavior: "smooth" });
  }, 500);
}

// ── BAŞLAT ───────────────────────────────────────────────────
sahneYukle("baslangic");
</script>
